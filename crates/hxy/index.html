<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, user-scalable=no"
        />

        <title>hxy</title>

        <!-- Compile our cdylib with --no-default-features --features wasm
             so Trunk sees the wasm-only dep set instead of pulling in
             the desktop graph (winit / wgpu / tokio / sqlx / ...). -->
        <link
            data-trunk
            rel="rust"
            data-wasm-opt="2"
            data-cargo-no-default-features
            data-cargo-features="wasm"
        />
        <base data-trunk-public-url />

        <meta
            name="theme-color"
            media="(prefers-color-scheme: light)"
            content="#909090"
        />
        <meta
            name="theme-color"
            media="(prefers-color-scheme: dark)"
            content="#202020"
        />

        <style>
            html {
                touch-action: manipulation;
            }
            html, body {
                overflow: hidden;
                margin: 0 !important;
                padding: 0 !important;
                height: 100%;
                width: 100%;
                background: #909090;
            }
            @media (prefers-color-scheme: dark) {
                html, body {
                    background: #202020;
                }
            }
            canvas {
                margin-right: auto;
                margin-left: auto;
                display: block;
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
            }
            .centered {
                margin-right: auto;
                margin-left: auto;
                display: block;
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                color: #f0f0f0;
                font-size: 18px;
                font-family: Ubuntu-Light, Helvetica, sans-serif;
                text-align: center;
            }
            .lds-dual-ring {
                display: inline-block;
                width: 24px;
                height: 24px;
            }
            .lds-dual-ring:after {
                content: " ";
                display: block;
                width: 24px;
                height: 24px;
                margin: 0px;
                border-radius: 50%;
                border: 3px solid #fff;
                border-color: #fff transparent #fff transparent;
                animation: lds-dual-ring 1.2s linear infinite;
            }
            @keyframes lds-dual-ring {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }
        </style>
    </head>

    <body>
        <!-- Canvas id is hardcoded in `crates/hxy/src/wasm.rs`; keep
             them in sync. -->
        <canvas id="hxy_canvas"></canvas>

        <!-- Removed by `wasm.rs::start()` once eframe finishes
             initializing. -->
        <div class="centered" id="loading_text">
            <p>Loading hxy...</p>
            <div class="lds-dual-ring"></div>
        </div>
    </body>
</html>
