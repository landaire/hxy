[tasks.fmt]
description = "Runs rustfmt with unstable features"
run = "cargo fmt -- --config unstable_features=true --config imports_granularity=Item --config imports_layout=Vertical"

[tasks.check]
description = "Runs cargo-check against all features and WASM target"
run = [
    "cargo check --all-features",
    "cargo check -p hxy-app --target wasm32-unknown-unknown --no-default-features --features wasm",
]

[tasks.fix]
description = "Runs cargo-fix against all features"
run = "cargo fix --all-features --allow-dirty"
depends_post = ["fmt"]

[tasks.clippy-fix]
description = "Runs cargo-clippy-fix against all features"
run = "cargo clippy --fix --all-features --allow-dirty"
depends_post = ["fmt"]

[tasks.fix-all]
description = "Runs clippy fix, fmt, and checks WASM target"
run = [
    "cargo clippy --fix --all-features --allow-dirty",
    "cargo check -p hxy-app --target wasm32-unknown-unknown --no-default-features --features wasm",
]
depends_post = ["fmt"]

# Per-plugin "build + deploy to user data dir" tasks. The deploy
# step delegates to `scripts/deploy_plugin.py` so the same task
# works on Linux / macOS / Windows (no PowerShell, no shell
# pipelines). Drop a built component into the running hxy's plugin
# discovery directory; restart or click Rescan to pick it up.

[tasks."plugin:xbox-neighborhood"]
description = "Build + deploy the xbox-neighborhood plugin"
run = [
    "cargo build --manifest-path plugins/xbox-neighborhood/Cargo.toml --target wasm32-wasip2 --release",
    "python scripts/deploy_plugin.py plugins/xbox-neighborhood hxy_xbox_neighborhood handler",
]

[tasks."plugin:test-statecmd"]
description = "Build + deploy the test-statecmd plugin"
run = [
    "cargo build --manifest-path plugins/test-statecmd/Cargo.toml --target wasm32-wasip2 --release",
    "python scripts/deploy_plugin.py plugins/test-statecmd hxy_plugin_test_statecmd handler",
]

[tasks."plugin:passthrough"]
